<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>膚質診斷諮詢單 - 泡泡臉八德館</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans TC"', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f9f6fc',
              100: '#f1ebf6',
              200: '#e1d2eb',
              300: '#cab0dc',
              400: '#ae85c7',
              500: '#9460b1',
              600: '#814a9a',
              700: '#6d3c82',
              800: '#5c356d',
              900: '#4d2e5a',
              DEFAULT: '#9A82AA',
              dark: '#6A4C73',
              light: '#E6DFED'
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f7f5f9;
      background-image: radial-gradient(#e1d2eb 0.5px, transparent 0.5px);
      background-size: 20px 20px;
    }
    
    .radio-custom:checked + label {
      border-color: #9A82AA;
      background-color: #f9f6fc;
    }
    .radio-custom:checked + label .radio-circle {
      border-color: #9A82AA;
    }
    .radio-custom:checked + label .radio-circle::after {
      transform: scale(1);
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="antialiased text-gray-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const FORM_ACTION = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSeXtuhIRvnlPa35jsBnJ425ta3LNwMCmmDCels8QWtArhqdWQ/formResponse";
    
    const FIELDS = {
      name: "entry.201452823",
      gender: "entry.2070932752",
      age: "entry.1844069388",
      job: "entry.1141045621",
      q1: "entry.1941121610",
      q2: "entry.818827577",
      q3: "entry.827274494",
      q4: "entry.568787330",
      q5: "entry.74609922",
      q6: "entry.682606750",
      q7: "entry.2111519056",
      q8: "entry.2011751690",
      q9: "entry.1475037026",
    };

    const RADIO_OPTIONS = {
      q1: ["1細小且不明顯", "2極為細小", "3T字粗大/兩頰細", "4粗大且明顯", "5視原膚質而定"],
      q2: ["1肌理平順細緻", "2觸摸明顯粗糙", "3肌膚觸感較厚", "4局部油膩/局部乾", "5皮膚看起來較薄"],
      q3: ["1不油不膩、平衡", "2全臉幾乎無油", "3全臉泛油光", "4油脂集中於T字", "5皮脂膜通常受損"],
      q4: ["1水分充盈濕潤", "2感到緊繃、缺水", "3常伴隨內乾外油", "4兩頰緊繃脫皮", "5常感發癢或刺痛"],
      q5: ["1充滿健康光澤", "2暗沈無光澤", "3油膩、毛孔阻塞", "4T區油光/U區乾", "5微血管明顯可見"],
      q6: ["1富有彈性", "2缺乏彈性", "3彈性尚可", "4局部表現不一", "5彈性可能較差"],
      q7: ["1幾乎無症狀", "2易長皺紋、斑點", "3易長痘痘、粉刺", "4T區痘/U區緊繃", "5易發疹子、泛紅"],
      q8: ["1耐受度高、穩定", "2易因低溫脫皮", "3對溫濕度反應敏感", "4受環境影響波動大", "5耐受值低、易發炎"],
      q9: ["1持久且自然", "2易浮粉、不吃妝", "3容易上妝也易脫妝", "4局部脫妝、局部乾", "5易因化妝品不適"],
    };

    const QUESTIONS_TITLES = {
      q1: "1. 毛孔狀態",
      q2: "2. 肌理與觸感",
      q3: "3. 油脂分泌",
      q4: "4. 水分/感覺",
      q5: "5. 外觀特徵",
      q6: "6. 彈性表現",
      q7: "7. 常見問題",
      q8: "8. 對外界反應",
      q9: "9. 妝效表現",
    };

    const Card = ({ children, className = "" }) => (
      <div className={`bg-white rounded-2xl shadow-[0_4px_20px_-4px_rgba(154,130,170,0.15)] p-6 mb-6 border border-brand-100 ${className}`}>
        {children}
      </div>
    );

    const TextInput = ({ label, name, required, placeholder, type = "text" }) => (
      <div className="mb-6">
        <label className="block text-brand-dark font-medium mb-2 flex items-center">
          {label} {required && <span className="text-red-400 ml-1">*</span>}
        </label>
        <input 
          type={type}
          name={name}
          required={required}
          placeholder={placeholder}
          className="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-300 focus:border-transparent transition-all duration-200"
        />
      </div>
    );

    const RadioGroup = ({ title, name, options }) => (
      <Card className="hover:shadow-[0_8px_30px_-4px_rgba(154,130,170,0.2)] transition-shadow duration-300">
        <h3 className="text-lg font-bold text-brand-dark mb-4 flex items-center">
          <i className="ph-fill ph-sparkle text-brand-DEFAULT mr-2"></i>
          {title} <span className="text-red-400 ml-1 text-sm">*</span>
        </h3>
        <div className="space-y-3">
          {options.map((opt, idx) => {
            const id = `${name}-${idx}`;
            return (
              <div key={idx} className="relative">
                <input 
                  type="radio" 
                  id={id} 
                  name={name} 
                  value={opt} 
                  required 
                  className="radio-custom absolute opacity-0 w-full h-full cursor-pointer z-10"
                />
                <label 
                  htmlFor={id} 
                  className="flex items-center p-4 border border-gray-100 rounded-xl cursor-pointer transition-all duration-200 hover:bg-brand-50"
                >
                  <div className="radio-circle w-5 h-5 rounded-full border-2 border-gray-300 mr-3 flex items-center justify-center relative">
                    <div className="w-2.5 h-2.5 rounded-full bg-brand-DEFAULT scale-0 transition-transform duration-200 after-element absolute"></div>
                  </div>
                  <span className="text-gray-700 font-medium">{opt}</span>
                </label>
              </div>
            );
          })}
        </div>
      </Card>
    );

    const App = () => {
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleSubmit = () => {
        setIsSubmitting(true);
      };

      if (isSubmitted) {
        return (
          <div className="min-h-screen flex items-center justify-center p-4 fade-in">
            <div className="bg-white max-w-md w-full rounded-3xl p-8 text-center shadow-2xl border border-brand-100 relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-brand-300 to-brand-500"></div>
              <div className="w-20 h-20 bg-brand-50 rounded-full flex items-center justify-center mx-auto mb-6 text-brand-DEFAULT">
                <i className="ph-fill ph-check-circle text-5xl"></i>
              </div>
              <h2 className="text-2xl font-bold text-brand-dark mb-4">諮詢單已成功送出！</h2>
              <p className="text-gray-600 mb-8 leading-relaxed text-lg font-medium">
                我們已收到您的諮詢！<br/>專屬肌膚管理師將為您進行深度分析，<br/>並於評估後盡快提供您的『客製化膚質報告』。
              </p>
              <button 
                onClick={() => window.location.reload()}
                className="w-full bg-brand-100 text-brand-800 font-bold py-3 px-6 rounded-xl hover:bg-brand-200 transition-colors"
              >
                返回重新填寫
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-2xl mx-auto py-10 px-4 md:px-6 fade-in">
          
          <div className="text-center mb-10">
            <img 
              src="https://drive.google.com/thumbnail?id=1BEFOvnXFGPiQjtvYrZ8AMmk1f-FzVfFG&sz=w500" 
              alt="泡泡臉 Logo" 
              className="w-28 h-28 object-contain mx-auto mb-4 rounded-[2rem] shadow-sm border border-brand-100 bg-white p-2"
              onError={(e) => {
                e.target.onerror = null; 
                e.target.src = 'https://placehold.co/150x150/f9f6fc/9A82AA?text=Logo';
              }}
            />
            <h1 className="text-3xl font-bold text-brand-dark mb-3 tracking-tight">膚質診斷諮詢單</h1>
            <h2 className="text-lg text-brand-600 font-medium mb-4">泡泡臉八德館</h2>
            <p className="text-gray-500 bg-white inline-block px-6 py-2 rounded-full shadow-sm text-sm border border-brand-50">
              請依照您目前的真實肌膚狀況進行勾選，<br className="sm:hidden" />完成後我們將為您分析專屬膚質類型。
            </p>
          </div>

          <iframe 
            name="hidden_iframe" 
            id="hidden_iframe" 
            style={{ display: 'none' }}
            onLoad={() => {
              if (isSubmitting) {
                setIsSubmitting(false);
                setIsSubmitted(true);
                window.scrollTo(0, 0);
              }
            }}
          ></iframe>

          <form action={FORM_ACTION} method="POST" target="hidden_iframe" onSubmit={handleSubmit}>
            
            <Card className="border-t-4 border-t-brand-DEFAULT">
              <h2 className="text-xl font-bold text-brand-dark mb-6 pb-4 border-b border-gray-100 flex items-center">
                <i className="ph-fill ph-user-circle text-brand-400 mr-2 text-2xl"></i>
                第一部分：基本資料
              </h2>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                <TextInput label="姓名" name={FIELDS.name} required placeholder="請輸入姓名" />
                
                <div className="mb-6">
                  <label className="block text-brand-dark font-medium mb-2 flex items-center">
                    性別 <span className="text-red-400 ml-1">*</span>
                  </label>
                  <div className="relative">
                    <select name={FIELDS.gender} required className="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-300 focus:border-transparent transition-all duration-200 appearance-none">
                      <option value="" disabled selected>請選擇性別</option>
                      <option value="女">女</option>
                      <option value="男">男</option>
                      <option value="其他">其他</option>
                    </select>
                    <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-brand-DEFAULT">
                      <i className="ph-bold ph-caret-down"></i>
                    </div>
                  </div>
                </div>

                <TextInput label="年齡" name={FIELDS.age} type="number" required placeholder="例如：25" />
                <TextInput label="工作性質" name={FIELDS.job} required placeholder="例如：上班族、戶外業務..." />
              </div>
            </Card>

            <div className="flex items-center my-8 text-brand-300">
              <div className="flex-grow border-t border-brand-200"></div>
              <span className="mx-4 text-sm font-medium">接下來請選擇最符合您的狀況</span>
              <div className="flex-grow border-t border-brand-200"></div>
            </div>

            <div className="mb-4 pl-2">
              <h2 className="text-xl font-bold text-brand-dark flex items-center">
                <i className="ph-fill ph-magnifying-glass text-brand-400 mr-2 text-2xl"></i>
                第二部分：膚質判斷指標
              </h2>
            </div>

            <RadioGroup title={QUESTIONS_TITLES.q1} name={FIELDS.q1} options={RADIO_OPTIONS.q1} />
            <RadioGroup title={QUESTIONS_TITLES.q2} name={FIELDS.q2} options={RADIO_OPTIONS.q2} />
            <RadioGroup title={QUESTIONS_TITLES.q3} name={FIELDS.q3} options={RADIO_OPTIONS.q3} />
            <RadioGroup title={QUESTIONS_TITLES.q4} name={FIELDS.q4} options={RADIO_OPTIONS.q4} />
            <RadioGroup title={QUESTIONS_TITLES.q5} name={FIELDS.q5} options={RADIO_OPTIONS.q5} />
            <RadioGroup title={QUESTIONS_TITLES.q6} name={FIELDS.q6} options={RADIO_OPTIONS.q6} />
            <RadioGroup title={QUESTIONS_TITLES.q7} name={FIELDS.q7} options={RADIO_OPTIONS.q7} />
            <RadioGroup title={QUESTIONS_TITLES.q8} name={FIELDS.q8} options={RADIO_OPTIONS.q8} />
            <RadioGroup title={QUESTIONS_TITLES.q9} name={FIELDS.q9} options={RADIO_OPTIONS.q9} />

            <div className="mt-10 mb-20 text-center">
              <button 
                type="submit"
                disabled={isSubmitting}
                className={`
                  relative inline-flex items-center justify-center px-12 py-4 text-lg font-bold text-white rounded-full
                  bg-gradient-to-r from-brand-400 to-brand-600 shadow-[0_10px_25px_-5px_rgba(154,130,170,0.5)]
                  hover:shadow-[0_15px_35px_-5px_rgba(154,130,170,0.6)] hover:-translate-y-1
                  transition-all duration-300 w-full sm:w-auto overflow-hidden
                  ${isSubmitting ? 'opacity-80 cursor-wait' : ''}
                `}
              >
                {isSubmitting ? (
                  <span className="flex items-center">
                    <i className="ph ph-spinner animate-spin mr-2 text-xl"></i>
                    傳送中...
                  </span>
                ) : (
                  <span className="flex items-center">
                    送出診斷諮詢單
                    <i className="ph-bold ph-paper-plane-right ml-2"></i>
                  </span>
                )}
              </button>
              <p className="mt-4 text-sm text-brand-400">
                <i className="ph-fill ph-lock-key mr-1"></i>
                您的資料僅供肌膚分析使用，絕對保密。
              </p>
            </div>
          </form>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>
    input[type="radio"]:checked + label .after-element {
      transform: scale(1);
    }
  </style>
</body>
</html>
